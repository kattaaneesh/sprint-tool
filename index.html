<!DOCTYPE html>
<html>
<head>
  <title>Agile Sprint Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Smart Agile Sprint Management Tool</h1>

<input id="taskTitle" placeholder="Enter Task">
<button onclick="addTask()">Add Task</button>

<div class="board">
  <div class="column" id="todo">
    <h2>To Do</h2>
  </div>

  <div class="column" id="progress">
    <h2>In Progress</h2>
  </div>

  <div class="column" id="done">
    <h2>Done</h2>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
